<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kookytiger — portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════════
     POOL SCENE
     ═══════════════════════════════════════ -->
<div id="pool-scene">

  <!-- Pool SVG -->
  <svg id="pool-svg" width="100%" height="100%" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid meet">
    <defs>
      <!-- Pool edge breathing filter -->
      <filter id="pool-breathe" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="3" result="breathe">
          <animate attributeName="baseFrequency" values="0.010;0.020;0.010" dur="20s" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="breathe" scale="14" xChannelSelector="R" yChannelSelector="G" result="breathed"/>
        <!-- Cursor ripple layer -->
        <feTurbulence type="turbulence" baseFrequency="0.035" numOctaves="2" result="ripple"/>
        <feDisplacementMap id="ripple-displacement" in="breathed" in2="ripple" scale="0" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>

    <!-- Pool shape (two layers) -->
    <g id="pool-group" filter="url(#pool-breathe)">
      <!-- Outer pool -->
      <path id="pool-outer"
        d="M 300,340 C 350,250 500,195 680,205 C 860,215 1000,280 1060,380
           C 1120,480 1090,580 980,635 C 870,690 730,700 570,680
           C 410,660 300,590 260,500 C 220,410 250,360 300,340 Z"
        fill="#7fcdee" opacity="0.85"/>
      <!-- Inner pool -->
      <path id="pool-inner"
        d="M 360,370 C 395,300 520,255 680,262 C 840,270 945,325 990,400
           C 1035,475 1015,555 930,595 C 845,635 730,642 590,630
           C 450,618 365,565 335,495 C 305,425 325,380 360,370 Z"
        fill="#5ab5dd"/>
    </g>
  </svg>

  <!-- Tiger SVG (same viewBox, layered on top) -->
  <svg id="tiger-svg" width="100%" height="100%" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid meet">

    <g id="tiger-container" transform="translate(960, 460)">

      <!-- Tail (behind body) -->
      <g id="tail" class="tiger-zone">
        <g id="tiger-tail">
          <path d="M40,25 C65,8 78,-22 68,-50 C60,-68 44,-62 38,-48"
                fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        </g>
      </g>

      <!-- Body -->
      <g id="heart" class="tiger-zone" data-section="philosophy">
        <path d="M-32,-12 C-40,15 -36,52 -24,70 C-10,88 10,88 24,70 C36,52 40,15 32,-12 C24,-28 -24,-28 -32,-12 Z"
              fill="none" stroke="#000" stroke-width="2.5"/>
        <!-- Stripes -->
        <line x1="-26" y1="8" x2="-16" y2="12" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="-24" y1="30" x2="-14" y2="33" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="26" y1="8" x2="16" y2="12" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
        <line x1="24" y1="30" x2="14" y2="33" stroke="#000" stroke-width="1.8" stroke-linecap="round"/>
        <text class="hover-label" x="0" y="45" text-anchor="middle">philosophy</text>
      </g>

      <!-- Head -->
      <g id="brain" class="tiger-zone" data-section="experience">
        <circle cx="0" cy="-46" r="30" fill="none" stroke="#000" stroke-width="2.5"/>
        <!-- Nose -->
        <path d="M-3,-34 L0,-30 L3,-34" fill="none" stroke="#000" stroke-width="1.8" stroke-linejoin="round"/>
        <!-- Mouth hint -->
        <line x1="0" y1="-30" x2="0" y2="-26" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
        <!-- Whiskers -->
        <line x1="-20" y1="-34" x2="-8" y2="-35" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="-18" y1="-29" x2="-8" y2="-31" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="20" y1="-34" x2="8" y2="-35" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="18" y1="-29" x2="8" y2="-31" stroke="#000" stroke-width="1.2" stroke-linecap="round"/>
        <text class="hover-label" x="0" y="-82" text-anchor="middle">experience</text>
      </g>

      <!-- Ears -->
      <g id="ears" class="tiger-zone" data-easter="music">
        <path d="M-18,-70 L-26,-92 L-10,-76" fill="none" stroke="#000" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M18,-70 L26,-92 L10,-76" fill="none" stroke="#000" stroke-width="2.5" stroke-linejoin="round"/>
        <text class="hover-label" x="0" y="-98" text-anchor="middle">♪</text>
      </g>

      <!-- Left eye -->
      <g id="left-eye" class="tiger-zone" data-section="visual">
        <circle cx="-11" cy="-50" r="3" fill="#000"/>
        <circle class="eye-pupil" cx="-11" cy="-50" r="3" fill="#000"/>
        <text class="hover-label" x="-11" y="-60" text-anchor="middle">visual</text>
      </g>

      <!-- Right eye -->
      <g id="right-eye" class="tiger-zone" data-section="film">
        <circle cx="11" cy="-50" r="3" fill="#000"/>
        <circle class="eye-pupil" cx="11" cy="-50" r="3" fill="#000"/>
        <text class="hover-label" x="11" y="-60" text-anchor="middle">film</text>
      </g>

      <!-- Paws -->
      <g id="paws" class="tiger-zone" data-section="product">
        <line x1="-14" y1="68" x2="-14" y2="82" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="14" y1="68" x2="14" y2="82" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
        <ellipse cx="-14" cy="86" rx="9" ry="5" fill="none" stroke="#000" stroke-width="2"/>
        <ellipse cx="14" cy="86" rx="9" ry="5" fill="none" stroke="#000" stroke-width="2"/>
        <text class="hover-label" x="0" y="102" text-anchor="middle">product</text>
      </g>

    </g>
  </svg>
</div>

<!-- ═══════════════════════════════════════
     ENTRY FLOW
     ═══════════════════════════════════════ -->
<div id="entry-overlay">
  <div id="entry-hello" class="entry-step active">
    <div id="hello-text">HELLO</div>
    <div id="name-input-wrap">
      <input id="name-input" type="text" placeholder="what's your name?" maxlength="20" autocomplete="off"/>
    </div>
  </div>
  <div id="entry-greeting" class="entry-step">
    <div id="speech-bubble">
      <span id="greeting-text"></span>
    </div>
    <div id="mode-picker">
      <button id="mode-quick" class="mode-btn">
        <span class="mode-label">Quick Look</span>
        <span class="mode-sub">scroll-through portfolio</span>
      </button>
      <button id="mode-hangout" class="mode-btn">
        <span class="mode-label">Hang Out</span>
        <span class="mode-sub">explore + interact</span>
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     HUB BACKGROUND
     ═══════════════════════════════════════ -->
<div id="hub">
  <div id="hub-bg">
    <div class="bg-shape"></div>
    <div class="bg-shape"></div>
    <div class="bg-shape"></div>
    <div class="bg-shape"></div>
  </div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- ═══════════════════════════════════════
     HUD
     ═══════════════════════════════════════ -->
<div id="hud-explored" class="hud-el" style="display:none">
  <svg id="explored-ring" width="42" height="42"><circle cx="21" cy="21" r="20" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="2"/><circle id="explored-fill" cx="21" cy="21" r="20" fill="none" stroke="#f7931e" stroke-width="2" stroke-dasharray="125.66" stroke-dashoffset="125.66" transform="rotate(-90 21 21)"/></svg>
  <span id="explored-pct">0%</span>
</div>
<div id="hud-right" class="hud-el" style="display:none">
  <div id="token-counter"><span id="token-icon">✦</span><span id="token-value">0</span></div>
  <div id="checklist"></div>
</div>
<div id="hud-sidebar" class="hud-el" style="display:none"></div>
<div id="hud-bottom-left" class="hud-el" style="display:none">
  <button id="btn-fridge" class="hud-icon locked">🍱</button>
  <button id="btn-wardrobe" class="hud-icon locked">👔</button>
</div>
<div id="hud-bottom-right" class="hud-el" style="display:none">
  <button id="btn-chat" class="hud-icon locked">💬</button>
</div>

<div id="forecast-bubble" class="hidden"></div>
<div id="preview-cards"></div>

<!-- ═══════════════════════════════════════
     OVERLAYS
     ═══════════════════════════════════════ -->

<!-- Blackboard (Mode 1: Quick Look) -->
<div id="blackboard-overlay" class="overlay">
  <div id="blackboard">
    <button class="close-btn">✕</button>
    <div id="bb-content">
      <h1 id="bb-hero-line"></h1>
      <div id="bb-projects"></div>
      <div class="bb-skills-grid" id="bb-skills"></div>
      <div id="bb-about"></div>
      <div id="bb-contact"></div>
    </div>
  </div>
  <div id="bb-checklist"></div>
  <button id="bb-switch" class="cta-btn">Switch to Explore Mode</button>
</div>

<!-- Project detail -->
<div id="project-overlay" class="overlay">
  <div id="project-card">
    <button class="close-btn">✕</button>
    <div id="project-hero">[ cover ]</div>
    <div id="project-header">
      <div id="project-title"></div>
      <div id="project-meta">
        <span id="project-section-tag"></span>
        <span id="project-year"></span>
      </div>
      <div id="project-logline"></div>
    </div>
    <div id="project-body"></div>
    <div id="project-gallery"></div>
  </div>
</div>

<!-- Section landing -->
<div id="section-overlay" class="overlay">
  <div id="section-card">
    <button class="close-btn">✕</button>
    <h2 id="section-title"></h2>
    <div id="section-projects"></div>
  </div>
</div>

<!-- Skills -->
<div id="skills-overlay" class="overlay">
  <div id="skills-card">
    <button class="close-btn">✕</button>
    <h2>Skills</h2>
    <div id="skills-grid"></div>
  </div>
</div>

<!-- About -->
<div id="about-overlay" class="overlay">
  <div id="about-card">
    <button class="close-btn">✕</button>
    <h2 id="about-name">Kay Xia</h2>
    <div id="about-program"></div>
    <div id="about-bio"></div>
    <div id="about-philosophy"></div>
  </div>
</div>

<!-- Contact -->
<div id="contact-overlay" class="overlay">
  <div id="contact-card">
    <button class="close-btn">✕</button>
    <h2>Contact</h2>
    <div id="contact-links"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MODALS
     ═══════════════════════════════════════ -->

<!-- Fridge -->
<div id="fridge-modal" class="modal">
  <div class="modal-content">
    <button class="close-btn modal-close">✕</button>
    <h2>🍱 Fridge</h2>
    <div id="fridge-items"></div>
  </div>
</div>

<!-- Wardrobe -->
<div id="wardrobe-modal" class="modal">
  <div class="modal-content">
    <button class="close-btn modal-close">✕</button>
    <h2>👔 Wardrobe</h2>
    <div id="wardrobe-items"></div>
  </div>
</div>

<!-- Chat -->
<div id="chat-modal" class="modal">
  <div class="modal-content chat-content">
    <button class="close-btn modal-close">✕</button>
    <h2>💬 Chat</h2>
    <div id="chat-messages"></div>
    <div id="chat-input-wrap">
      <input id="chat-input" type="text" placeholder="say something..." autocomplete="off"/>
      <button id="chat-send">→</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
