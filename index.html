<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kookytiger — particle proof of concept</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fafaf7; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script src="https://cdn.jsdelivr.net/npm/simplex-noise@4.0.3/dist/esm/simplex-noise.js" type="module"></script>
<script type="module">
import { createNoise3D } from 'https://cdn.jsdelivr.net/npm/simplex-noise@4.0.3/dist/esm/simplex-noise.js';

/* ═══════════════════════════════════════════
   TUNABLE CONSTANTS — tweak these freely
   ═══════════════════════════════════════════ */

const PARTICLE_COUNT      = 800;       // total particles (blue + orange)
const ORANGE_RATIO        = 0.12;      // fraction that are orange tiger particles
const BG_COLOR            = '#fafaf7'; // off-white background

// Blue particle color range (deep navy → light sky)
const BLUE_DEEP           = [26, 58, 92];    // #1a3a5c
const BLUE_LIGHT          = [127, 205, 238]; // #7fcdee

// Orange particle color
const ORANGE_COLOR        = '#f7931e';

// Particle size
const RADIUS_MIN          = 1.5;
const RADIUS_MAX          = 3.0;

// Noise field
const NOISE_SCALE         = 0.0015;   // spatial frequency of the flow field
const NOISE_SPEED         = 0.0003;   // how fast the field evolves over time
const FLOW_STRENGTH       = 0.8;      // how strongly particles follow the flow field

// Cursor interaction
const CURSOR_RADIUS       = 150;      // influence radius in px
const CURSOR_PUSH         = 2.5;      // how strongly cursor pushes blue particles
const CURSOR_PUSH_ORANGE  = 0.6;      // weaker push on orange (they resist)

// Tiger silhouette
const TIGER_SCALE         = 0.15;     // fraction of viewport width the tiger occupies
const TIGER_ATTRACT       = 0.012;    // how strongly orange particles pull toward silhouette
const TIGER_DAMPING       = 0.94;     // velocity damping for orange particles (lower = more sluggish)
const BLUE_DAMPING        = 0.96;     // velocity damping for blue particles

// Particle opacity
const BLUE_OPACITY_MIN    = 0.25;
const BLUE_OPACITY_MAX    = 0.7;
const ORANGE_OPACITY      = 0.85;

/* ═══════════════════════════════════════════
   TIGER SILHOUETTE — sample points (normalized -1 to 1)
   These define the attractor shape.
   ═══════════════════════════════════════════ */

// Simple abstract tiger: body oval, head, ears, tail, legs
const TIGER_POINTS_NORM = [
  // Head (circle, top center)
  [0, -1.6], [0.25, -1.55], [-0.25, -1.55],
  [0.15, -1.75], [-0.15, -1.75], [0.3, -1.45], [-0.3, -1.45],
  [0, -1.4],

  // Ears
  [-0.35, -1.9], [-0.28, -2.05], [-0.2, -1.95],
  [0.35, -1.9], [0.28, -2.05], [0.2, -1.95],

  // Body (oval)
  [0, -0.8], [0, -0.4], [0, 0], [0, 0.4], [0, 0.7],
  [0.35, -0.7], [-0.35, -0.7],
  [0.45, -0.3], [-0.45, -0.3],
  [0.45, 0.1], [-0.45, 0.1],
  [0.4, 0.5], [-0.4, 0.5],
  [0.3, 0.8], [-0.3, 0.8],
  [0.2, -0.5], [-0.2, -0.5],
  [0.2, 0.3], [-0.2, 0.3],

  // Front legs
  [-0.3, 1.0], [-0.3, 1.3], [-0.3, 1.5],
  [0.3, 1.0], [0.3, 1.3], [0.3, 1.5],

  // Back legs (wider)
  [-0.45, 0.8], [-0.5, 1.1], [-0.45, 1.4],
  [0.45, 0.8], [0.5, 1.1], [0.45, 1.4],

  // Tail (curves to the right)
  [0.35, 0.6], [0.55, 0.4], [0.7, 0.15], [0.8, -0.1],
  [0.85, -0.35], [0.8, -0.55],
];

/* ═══════════════════════════════════════════
   SETUP
   ═══════════════════════════════════════════ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const noise3D = createNoise3D();

let W, H, tigerCx, tigerCy, tigerSize, tigerPoints;
let mouseX = -9999, mouseY = -9999;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  tigerCx = W * 0.5;
  tigerCy = H * 0.52;
  tigerSize = W * TIGER_SCALE;

  // Convert normalized tiger points to screen coordinates
  tigerPoints = TIGER_POINTS_NORM.map(([nx, ny]) => [
    tigerCx + nx * tigerSize,
    tigerCy + ny * tigerSize * 0.5
  ]);
}

window.addEventListener('resize', resize);
resize();

/* ═══════════════════════════════════════════
   CURSOR TRACKING
   ═══════════════════════════════════════════ */

canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('mouseleave', () => {
  mouseX = -9999;
  mouseY = -9999;
});

/* ═══════════════════════════════════════════
   PARTICLE CREATION
   ═══════════════════════════════════════════ */

function lerpColor(a, b, t) {
  return [
    Math.round(a[0] + (b[0] - a[0]) * t),
    Math.round(a[1] + (b[1] - a[1]) * t),
    Math.round(a[2] + (b[2] - a[2]) * t),
  ];
}

function createParticle(isOrange) {
  const r = RADIUS_MIN + Math.random() * (RADIUS_MAX - RADIUS_MIN);

  if (isOrange) {
    // Start near a random tiger attractor point with some scatter
    const tp = tigerPoints[Math.floor(Math.random() * tigerPoints.length)];
    return {
      x: tp[0] + (Math.random() - 0.5) * tigerSize * 0.8,
      y: tp[1] + (Math.random() - 0.5) * tigerSize * 0.8,
      vx: 0, vy: 0,
      r,
      isOrange: true,
      color: ORANGE_COLOR,
      opacity: ORANGE_OPACITY,
      targetIdx: Math.floor(Math.random() * tigerPoints.length),
    };
  }

  const t = Math.random();
  const [cr, cg, cb] = lerpColor(BLUE_DEEP, BLUE_LIGHT, t);
  const opacity = BLUE_OPACITY_MIN + Math.random() * (BLUE_OPACITY_MAX - BLUE_OPACITY_MIN);

  return {
    x: Math.random() * W,
    y: Math.random() * H,
    vx: 0, vy: 0,
    r,
    isOrange: false,
    color: `rgb(${cr},${cg},${cb})`,
    opacity,
    targetIdx: -1,
  };
}

const orangeCount = Math.round(PARTICLE_COUNT * ORANGE_RATIO);
const blueCount = PARTICLE_COUNT - orangeCount;

const particles = [];
for (let i = 0; i < blueCount; i++) particles.push(createParticle(false));
for (let i = 0; i < orangeCount; i++) particles.push(createParticle(true));

/* ═══════════════════════════════════════════
   FIND NEAREST TIGER POINT
   ═══════════════════════════════════════════ */

function nearestTigerPoint(x, y) {
  let bestDist = Infinity, bestIdx = 0;
  for (let i = 0; i < tigerPoints.length; i++) {
    const dx = x - tigerPoints[i][0];
    const dy = y - tigerPoints[i][1];
    const d = dx * dx + dy * dy;
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  return bestIdx;
}

/* ═══════════════════════════════════════════
   ANIMATION LOOP
   ═══════════════════════════════════════════ */

let time = 0;

function frame() {
  requestAnimationFrame(frame);
  time += NOISE_SPEED;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = BG_COLOR;
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];

    // Noise-driven flow field
    const angle = noise3D(p.x * NOISE_SCALE, p.y * NOISE_SCALE, time) * Math.PI * 2;
    p.vx += Math.cos(angle) * FLOW_STRENGTH;
    p.vy += Math.sin(angle) * FLOW_STRENGTH;

    // Orange particles: attract toward tiger silhouette
    if (p.isOrange) {
      // Periodically reassign to nearest point for natural clustering
      if (Math.random() < 0.02) {
        p.targetIdx = nearestTigerPoint(p.x, p.y);
      }
      const tp = tigerPoints[p.targetIdx];
      const dx = tp[0] - p.x;
      const dy = tp[1] - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      // Attraction strength increases with distance from target
      const attract = TIGER_ATTRACT * (1 + dist * 0.005);
      p.vx += dx * attract;
      p.vy += dy * attract;
    }

    // Cursor repulsion
    const cdx = p.x - mouseX;
    const cdy = p.y - mouseY;
    const cDist = Math.sqrt(cdx * cdx + cdy * cdy);
    if (cDist < CURSOR_RADIUS && cDist > 0) {
      const pushStrength = p.isOrange ? CURSOR_PUSH_ORANGE : CURSOR_PUSH;
      const force = (1 - cDist / CURSOR_RADIUS) * pushStrength;
      p.vx += (cdx / cDist) * force;
      p.vy += (cdy / cDist) * force;
    }

    // Damping
    const damp = p.isOrange ? TIGER_DAMPING : BLUE_DAMPING;
    p.vx *= damp;
    p.vy *= damp;

    // Update position
    p.x += p.vx;
    p.y += p.vy;

    // Wrap blue particles around edges; orange particles bounce softly
    if (p.isOrange) {
      if (p.x < 0) { p.x = 0; p.vx *= -0.5; }
      if (p.x > W) { p.x = W; p.vx *= -0.5; }
      if (p.y < 0) { p.y = 0; p.vy *= -0.5; }
      if (p.y > H) { p.y = H; p.vy *= -0.5; }
    } else {
      if (p.x < -20) p.x = W + 20;
      if (p.x > W + 20) p.x = -20;
      if (p.y < -20) p.y = H + 20;
      if (p.y > H + 20) p.y = -20;
    }

    // Draw
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.opacity;
    ctx.fill();
  }

  ctx.globalAlpha = 1;
}

requestAnimationFrame(frame);
</script>
</body>
</html>
